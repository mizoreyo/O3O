<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O3O</title>
  <style>
    html {
      font-size: 62.5%;
      -webkit-text-size-adjust: none;
    }

    body {
      background-color: rgb(205, 205, 205);
    }

    .article {
      width: 500px;
      background-color: rgb(93, 93, 93);
    }

    .main {
      width: 1000px;
      display: flex;
      justify-content: center;
      background-color: #fff;
    }
  </style>
  <link rel="stylesheet" href="./o3o.css">
  <script src="./o3o.js"></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&amp;family=Noto+Sans+SC:wght@300&amp;display=swap.css">
</head>

<body>
  <div class="main">
    <div class="article">
      哈哈哈
      <div class="O3O">
        <div class="c-body">
          <form class="c-info">
            <div class="c-i-blank"></div>
            <input class="c-i-input ci-nickname" placeholder="昵称" type="text">
            <div class="c-i-blank"></div>
            <input class="c-i-input ci-email" placeholder="邮箱" type="text">
            <div class="c-i-blank"></div>
            <input class="c-i-input ci-site" placeholder="网址" type="text">
            <div class="c-i-blank"></div>
          </form>
          <textarea class="c-area" placeholder="留下你的足迹~" oninput="countWords(this)"></textarea>
        </div>
        <div class="c-bar between">
          <div class="c-b-left between">
            <div class="c-b-button space">O3O</div>
            <div class="c-b-button at-user" onclick="resetReplyTo()">@</div>
          </div>
          <div class="c-b-right between">
            <div class="count"><span class="count-num">0</span> / 400</div>
            <div class="c-b-button" onclick="comment()">发布</div>
          </div>
        </div>
        <div class="o-comments">
          <h2 class="o-c-title">评论 <span class="o-c-count">0</span></h2>
          <ul class="o-c-list">
            还没有评论呢~
          </ul>
          <script>
            getComments()
          </script>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
